# Backend for hardware acceleration (required for blur)
backend = "glx";
glx-no-stencil = true;
glx-copy-from-front = false;
vsync = true;

# Opacity and Fading
fading = true;
fade-delta = 4;
fade-in-step = 0.03;
fade-out-step = 0.03;

blur-method = "dual_kawase";
blur-strength = 6;

blur-background-exclude = [
  "window_type = 'dock'",
  "class_g = 'Polybar'"
];

fade-exclude = [
    "class_g = 'xwinwrap'"
];

# Prevent rofi from being dimmed
mark-overdir-focused = true;

# Opacity rules (optional if not set in rofi theme)
opacity-rule = [
  "90:class_g = 'Rofi'"
];


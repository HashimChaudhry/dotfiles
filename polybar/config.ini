include-file = $HOME/.config/polybar/colors.ini
include-file = $HOME/.config/polybar/modules.ini

[bar/main]
monitor = ${env:MONITOR:} 
width = 90%
offset-x = 5%
offset-y = 10
height = 28pt
radius = 10
; dpi = 10

background = #CC282A36 
foreground = ${colors.foreground}

line-size = 3pt

border-size = 0
border-color = #00000000

padding-left = 5
padding-right = 5

module-margin = 3 

; separator = |
separator-foreground = ${colors.disabled}

font-0 = "JetBrainsMono Nerd Font:size=10;2"
font-1 = "JetBrainsMono Nerd Font:size=11;2"

modules-center = bspwm 
modules-left = pulseaudio cpu memory filesystem 
modules-right = date eth wlan

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; override-redirect = true
wm-restack = bspwm

[bar/secondary]
monitor = ${env:MONITOR:} 
width = 90%
offset-x = 5%
height = 28pt
radius = 10
; dpi = 10

background = #CC282A36
foreground = ${colors.foreground}

line-size = 3pt

border-size = 10 
border-color = #00000000

padding-left = 5
padding-right = 5

module-margin = 3 

; separator = |
separator-foreground = ${colors.disabled}

font-0 = "JetBrainsMono Nerd Font:size=10;2"
font-1 = "JetBrainsMono Nerd Font:size=11;2"

modules-center = bspwm 
modules-left = pulseaudio cpu memory filesystem 
modules-right = date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true
wm-restack = bspwm

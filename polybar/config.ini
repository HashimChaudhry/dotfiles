include-file = $HOME/.config/polybar/colors.ini
include-file = $HOME/.config/polybar/modules.ini

[bar/main]
monitor = ${env:MONITOR:} 
width = 97%
offset-x = 1.5%
offset-y = 10
height = 28pt
radius = 20
override-redirect = trueR
; dpi = 10

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 0
border-color = #00000000

padding-left = 5
padding-right = 5

module-margin = 3 

; separator = |
separator-foreground = ${colors.disabled}

font-0 = "JetBrainsMono Nerd Font:size=10;2"
font-1 = "JetBrainsMono Nerd Font:size=13;2"

modules-center = bspwm 
modules-left = pulseaudio cpu memory filesystem 
modules-right = date tray

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[bar/secondary]
monitor = ${env:MONITOR:} 
width = 97%
offset-x = 1.5%
height = 28pt
radius = 20
; dpi = 10

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 10 
border-color = #00000000

padding-left = 5
padding-right = 5

module-margin = 3 

; separator = |
separator-foreground = ${colors.disabled}

font-0 = "JetBrainsMono Nerd Font:size=10;2"
font-1 = "JetBrainsMono Nerd Font:size=13;2"

modules-center = bspwm 
modules-left = pulseaudio cpu memory filesystem 
modules-right = date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

